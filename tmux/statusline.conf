# vim: ft=tmux
set -g mode-style "fg=#d5d5d5,bg=#323232"

set -g message-style "fg=#d5d5d5,bg=#323232"
set -g message-command-style "fg=#d5d5d5,bg=#323232"

set -g pane-border-style "fg=#323232"
set -g pane-active-border-style "fg=#d5d5d5"

set -g status "on"
set -g status-interval 5
set -g status-justify "left"

set -g status-style "fg=#737373,bg=default"

set -g status-left-length "100"
set -g status-right-length "100"

set -g status-left-style NONE
set -g status-right-style NONE

set -g status-left "#[fg=#121212,bg=#d5d5d5,bold] #S #[fg=#d5d5d5,bg=default]"
set -g status-right "#[fg=#d5d5d5,bg=default]#[fg=#121212,bg=#d5d5d5,bold] #h "

setw -g window-status-activity-style "underscore,fg=#949494,bg=default"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#949494,bg=default"
setw -g window-status-format '#[fg=default,bg=default]#[default] #I  #{b:pane_current_path} #[fg=default,bg=default,nobold,nounderscore,noitalics]'
setw -g window-status-current-format '#[fg=default,bg=#ff0088]#[fg=#ffffff,bg=#ff0088,bold] #I #[fg=#ff0088,bg=#323232]#[fg=#d5d5d5,bg=#323232] #{b:pane_current_path} #[fg=#323232,bg=default,nobold]'
